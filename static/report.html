<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 招聘助手 - 评估报告</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <div id="app-nav"></div>
    <header>
      <h1>候选人评估报告</h1>
      <p>招聘方决策视角 · 过程评估 vs 终局结论 · 多维度打分</p>
    </header>

    <div id="report-container" class="card report-grid">
      <p style="color: var(--muted)">加载报告中...</p>
    </div>
  </div>

  <script type="module">
    import { showToast, apiRequest, getQueryParam, recommendationClass } from "/static/js/api.js";
    import { initAppNav, screeningHref } from "/static/js/nav.js";

    const sessionId = getQueryParam("session_id");
    let jobId = getQueryParam("job_id");
    const container = document.getElementById("report-container");
    let reportData = null;

    function setupReportNav(resolvedJobId) {
      const jid = resolvedJobId || jobId;
      const screening = jid ? screeningHref(jid) : null;
      initAppNav({
        currentStep: 4,
        jobId: jid ? Number(jid) : null,
        sessionId: sessionId ? Number(sessionId) : null,
        back: screening ? { label: "返回筛选", href: screening } : undefined,
        extraActions: [
          ...(screening
            ? [{ href: screening, label: "继续面试下一位", primary: true }]
            : []),
          {
            type: "button",
            id: "copy-json",
            label: "复制 JSON",
            onClick: () => {
              if (!reportData) {
                showToast("暂无报告数据", true);
                return;
              }
              navigator.clipboard.writeText(JSON.stringify(reportData, null, 2));
              showToast("已复制 JSON 到剪贴板");
            },
          },
        ],
      });
    }

    setupReportNav(jobId);

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function listItems(items) {
      if (!items?.length) return "<li>无</li>";
      return items.map((i) => `<li>${escapeHtml(i)}</li>`).join("");
    }

    function dimensionBar(label, score) {
      const val = Number(score) || 0;
      return `<div class="dim-row"><span class="dim-label">${escapeHtml(label)}</span><div class="dim-track"><div class="dim-fill" style="width:${val}%"></div></div><span class="dim-val">${val}</span></div>`;
    }

    const dimLabels = {
      technical_depth: "技术深度",
      communication_clarity: "表达清晰度",
      evidence_quality: "证据充分度",
      role_fit: "岗位匹配",
    };

    function deltaBadge(delta) {
      const n = Number(delta) || 0;
      if (n > 0) return `<span class="delta positive">+${n}</span>`;
      if (n < 0) return `<span class="delta negative">${n}</span>`;
      return `<span class="delta neutral">0</span>`;
    }

    function renderScoreTimeline(timeline) {
      if (!timeline?.length) {
        return "<p style='color:var(--muted)'>暂无评分时间线</p>";
      }
      return timeline.map((t) => {
        const cls = t.input_guard_blocked || t.job_fit_delta < 0 || t.comm_delta < 0
          ? "weak"
          : "";
        const adjHtml = (t.score_adjustments || []).map((a) =>
          `<li><strong>${escapeHtml(a.dimension)}</strong> ${deltaBadge(a.delta)} — ${escapeHtml(a.reason)}${a.evidence ? ` <em class="muted">(${escapeHtml(a.evidence)})</em>` : ""}</li>`
        ).join("");
        const guardTag = t.input_guard_blocked
          ? `<span class="badge badge-warning">安全拦截</span> `
          : "";
        return `<div class="timeline-item ${cls}">
          ${guardTag}<strong>第 ${t.round || "?"} 轮</strong>
          · 岗位分 ${t.live_job_fit_before ?? "—"} → ${t.live_job_fit_after ?? "—"} ${deltaBadge(t.job_fit_delta)}
          · 沟通 ${t.live_comm_before ?? "—"} → ${t.live_comm_after ?? "—"} ${deltaBadge(t.comm_delta)}
          ${adjHtml ? `<ul class="adjustment-list">${adjHtml}</ul>` : ""}
        </div>`;
      }).join("");
    }

    function renderFeedbackSection(existing) {
      if (existing) {
        const stars = "★".repeat(existing.rating) + "☆".repeat(5 - existing.rating);
        return `
          <div class="report-section feedback-section">
            <h3>您的面试体验反馈</h3>
            <p class="feedback-thanks">感谢反馈！您的意见将帮助我们优化后续面试体验。</p>
            <p><strong>评分：</strong><span class="star-display">${stars}</span> (${existing.rating}/5)</p>
            ${existing.comment ? `<p><strong>简述：</strong>${escapeHtml(existing.comment)}</p>` : ""}
            <p class="muted small">提交于 ${escapeHtml(existing.submitted_at || "—")}</p>
          </div>`;
      }
      return `
        <div class="report-section feedback-section" id="feedback-form-section">
          <h3>评价本次面试体验</h3>
          <p class="muted small">您的反馈不影响评分结果，将用于优化同岗位后续面试</p>
          <div class="field">
            <label>评分（1–5）</label>
            <div class="rating-buttons" id="rating-buttons">
              ${[1, 2, 3, 4, 5].map((n) => `<button type="button" class="btn btn-secondary btn-sm rating-btn" data-rating="${n}">${n}</button>`).join("")}
            </div>
            <input type="hidden" id="feedback-rating" value="" />
          </div>
          <div class="field">
            <label for="feedback-comment">简述（可选，≤500 字）</label>
            <textarea id="feedback-comment" rows="3" maxlength="500" placeholder="如：追问节奏、面试官语气、题目难度…"></textarea>
          </div>
          <button type="button" id="submit-feedback" class="btn btn-primary">提交反馈</button>
        </div>`;
    }

    function wireFeedbackForm() {
      const section = document.getElementById("feedback-form-section");
      if (!section) return;

      let selected = 0;
      section.querySelectorAll(".rating-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          selected = Number(btn.dataset.rating);
          document.getElementById("feedback-rating").value = String(selected);
          section.querySelectorAll(".rating-btn").forEach((b) => {
            b.classList.toggle("btn-primary", Number(b.dataset.rating) === selected);
            b.classList.toggle("btn-secondary", Number(b.dataset.rating) !== selected);
          });
        });
      });

      document.getElementById("submit-feedback").addEventListener("click", async () => {
        if (!selected) {
          showToast("请选择 1–5 分", true);
          return;
        }
        const comment = document.getElementById("feedback-comment").value.trim();
        const btn = document.getElementById("submit-feedback");
        btn.disabled = true;
        try {
          await apiRequest(`/api/interview/${sessionId}/feedback`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ rating: selected, comment: comment || null }),
          });
          showToast("反馈已提交，谢谢！");
          loadReport();
        } catch (err) {
          showToast(err.message, true);
          btn.disabled = false;
        }
      });
    }

    function renderGeneratingUI(progress, message) {
      const pct = Math.min(100, Math.max(0, Number(progress) || 0));
      container.innerHTML = `
        <div class="report-generating">
          <h3>正在生成评估报告</h3>
          <p class="muted">${escapeHtml(message || "请稍候…")}</p>
          <div class="progress-track">
            <div class="progress-fill" id="report-progress-bar" style="width:${pct}%"></div>
          </div>
          <p class="muted small" id="report-progress-text">${pct}%</p>
          <div class="report-skeleton">
            <div class="report-skeleton-block"></div>
            <div class="report-skeleton-block short"></div>
            <div class="report-skeleton-block"></div>
            <div class="report-skeleton-block medium"></div>
          </div>
        </div>`;
    }

    function renderFailedUI(error) {
      container.innerHTML = `
        <div class="report-generating report-failed">
          <h3>报告生成失败</h3>
          <p style="color:var(--danger)">${escapeHtml(error || "未知错误")}</p>
          <button type="button" id="retry-report" class="btn btn-primary">重试生成</button>
        </div>`;
      document.getElementById("retry-report").addEventListener("click", async () => {
        const btn = document.getElementById("retry-report");
        btn.disabled = true;
        try {
          await apiRequest(`/api/interview/${sessionId}/end`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ async: true }),
          });
          pollReportStatus();
        } catch (err) {
          showToast(err.message, true);
          btn.disabled = false;
        }
      });
    }

    async function pollReportStatus() {
      if (!sessionId) {
        container.innerHTML = "<p>缺少 session_id</p>";
        return;
      }
      for (;;) {
        try {
          const status = await apiRequest(`/api/interview/report/${sessionId}/status`);
          if (status.job_id && !jobId) {
            jobId = String(status.job_id);
            setupReportNav(jobId);
          }
          if (status.status === "completed") {
            await loadReport();
            return;
          }
          if (status.status === "failed") {
            renderFailedUI(status.error);
            return;
          }
          renderGeneratingUI(status.progress, status.message);
        } catch (err) {
          container.innerHTML = `<p style="color:var(--danger)">${escapeHtml(err.message)}</p>`;
          return;
        }
        await new Promise((r) => setTimeout(r, 1000));
      }
    }

    async function loadReport() {
      if (!sessionId) {
        container.innerHTML = "<p>缺少 session_id</p>";
        return;
      }
      try {
        const data = await apiRequest(`/api/interview/report/${sessionId}`);
        if (data.job_id && !jobId) {
          jobId = String(data.job_id);
          setupReportNav(jobId);
        }
        reportData = data.report;
        if (!reportData) {
          await pollReportStatus();
          return;
        }

        const rec = reportData.overall_recommendation || "hold";
        const evalLog = data.evaluations_log || [];
        const timeline = data.score_timeline || [];
        const candidateFeedback = data.candidate_feedback || null;
        const live = reportData.live_snapshot || {};
        const dims = reportData.dimension_scores || {};
        const dimHtml = Object.keys(dimLabels).map((k) =>
          dimensionBar(dimLabels[k], dims[k] ?? 0)
        ).join("");

        const evalHtml = evalLog.length
          ? evalLog.map((e) => {
              const cls = e.resume_mismatch || e.off_topic
                ? "mismatch"
                : e.answer_quality === "weak" || e.communication_signal === "vague"
                  ? "weak"
                  : "";
              return `<div class="eval-log-item ${cls}">
                <strong>第 ${e.round || "?"} 轮</strong> · ${escapeHtml(e.answer_quality || "—")}
                ${e.competency_signal ? ` · ${escapeHtml(e.competency_signal)}` : ""}
                ${e.confidence != null ? ` · 置信 ${(e.confidence * 100).toFixed(0)}%` : ""}
                <p>${escapeHtml(e.calibration_notes || e.notes || e.followup_reason || "")}</p>
              </div>`;
            }).join("")
          : "<p style='color:var(--muted)'>无过程评估记录</p>";

        container.innerHTML = `
          <div class="report-section">
            <h3>招聘决策</h3>
            <p class="recommendation ${recommendationClass(rec)}">${escapeHtml(rec)}</p>
            <p>${escapeHtml(reportData.hiring_decision_rationale || "")}</p>
          </div>
          <div class="report-section">
            <h3>过程评估 vs 终局结论</h3>
            <div class="live-scores">
              <div class="live-score-item"><span class="label">过程·岗位匹配</span><span class="value">${live.provisional_job_fit ?? "—"}</span></div>
              <div class="live-score-item"><span class="label">终局·岗位匹配</span><span class="value">${reportData.job_fit_score}</span></div>
              <div class="live-score-item"><span class="label">过程·沟通</span><span class="value">${live.provisional_communication ?? "—"}</span></div>
              <div class="live-score-item"><span class="label">终局·沟通</span><span class="value">${reportData.communication_score}</span></div>
            </div>
            <p class="live-updated">终局置信度：${reportData.score_confidence != null ? (reportData.score_confidence * 100).toFixed(0) + "%" : "—"}</p>
          </div>
          <div class="report-section">
            <h3>评分时间线（可审计）</h3>
            <p class="muted small">每轮 Live 岗位/沟通分变化及 Calibrator 加减依据</p>
            ${renderScoreTimeline(timeline)}
          </div>
          <div class="report-section">
            <h3>多维度评估</h3>
            <div class="dim-bars">${dimHtml || "<p>暂无维度分</p>"}</div>
          </div>
          <div class="report-section">
            <h3>岗位匹配 (${reportData.job_fit_score}/100)</h3>
            <p>${escapeHtml(reportData.job_fit_summary)}</p>
          </div>
          <div class="report-section">
            <h3>沟通能力 (${reportData.communication_score}/100)</h3>
            <p>${escapeHtml(reportData.communication_summary)}</p>
          </div>
          <div class="report-section">
            <h3>优势</h3>
            <ul>${listItems(reportData.strengths)}</ul>
          </div>
          <div class="report-section">
            <h3>潜在风险</h3>
            <ul>${listItems(reportData.risk_points)}</ul>
          </div>
          <div class="report-section">
            <h3>下轮考察建议（如推进）</h3>
            <ul>${listItems(reportData.next_round_focus)}</ul>
          </div>
          <div class="report-section">
            <h3>面试过程摘要</h3>
            ${evalHtml}
          </div>
          ${renderFeedbackSection(candidateFeedback)}`;
        wireFeedbackForm();
      } catch (err) {
        container.innerHTML = `<p style="color:var(--danger)">${escapeHtml(err.message)}</p>`;
      }
    }

    pollReportStatus();
  </script>
</body>
</html>

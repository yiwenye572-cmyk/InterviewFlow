<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 招聘助手 - 模拟面试</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>AI 模拟面试</h1>
      <p>多轮对话 · 动态追问 · 实时流式输出</p>
    </header>

    <nav class="steps">
      <span class="step">1. 上传</span>
      <span class="step">2. 筛选</span>
      <span class="step active">3. 面试</span>
      <span class="step">4. 报告</span>
    </nav>

    <div class="card chat-layout">
      <div class="chat-meta">
        <span id="meta-persona">面试官：—</span>
        <span id="meta-round">轮次：0</span>
      </div>
      <div id="chat-window" class="chat-window"></div>
      <div class="chat-input-row">
        <textarea id="user-input" placeholder="输入你的回答..." rows="2"></textarea>
        <button id="send-btn" class="btn btn-primary">发送</button>
      </div>
      <div class="actions">
        <button id="end-btn" class="btn btn-danger">结束面试并生成报告</button>
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/interview.js"></script>
</body>
</html>

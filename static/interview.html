<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 招聘助手 - 模拟面试</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container interview-page">
    <div id="app-nav"></div>
    <header>
      <h1>AI 模拟面试</h1>
      <p>招聘方视角 · LangGraph 编排 · 双 Agent 打分校准</p>
    </header>

    <div class="interview-grid">
      <div class="card chat-layout">
        <div class="chat-meta">
          <span id="meta-persona">面试官：—</span>
          <span id="meta-mode">模式：—</span>
          <span id="meta-difficulty">难度：—</span>
          <span id="meta-phase">阶段：—</span>
          <span id="meta-round">轮次：0</span>
          <span id="meta-competencies">考察点：0/0</span>
        </div>
        <div id="chat-window" class="chat-window"></div>
        <div id="typing-indicator" class="typing-indicator hidden">面试官正在输入…</div>
        <div class="voice-transport-bar">
          <label class="transport-toggle">
            <input type="radio" name="transport" value="text" checked /> 文字
          </label>
          <label class="transport-toggle">
            <input type="radio" name="transport" value="voice" /> 语音
          </label>
          <span id="voice-status" class="voice-status hidden"></span>
        </div>
        <div class="chat-input-row" id="text-input-row">
          <textarea id="user-input" placeholder="输入你的回答..." rows="2"></textarea>
          <button id="send-btn" class="btn btn-primary">发送</button>
        </div>
        <div class="chat-input-row hidden" id="voice-input-row">
          <button id="hold-talk-btn" class="btn btn-primary btn-voice" type="button">
            按住说话
          </button>
        </div>
        <div class="actions">
          <button id="end-btn" class="btn btn-danger">结束面试并生成报告</button>
        </div>
      </div>

      <aside class="card live-sidebar" id="live-sidebar">
        <div class="live-header">
          <div class="sidebar-tabs">
            <button type="button" class="sidebar-tab active" data-tab="live">实时评估</button>
            <button type="button" class="sidebar-tab" data-tab="agenda">面试议程</button>
          </div>
          <button id="toggle-live" class="btn btn-secondary btn-sm" type="button">收起</button>
        </div>
        <div id="live-content" class="live-content sidebar-panel">
          <p class="live-placeholder">完成首轮回答后将显示实时评估快照</p>
        </div>
        <div id="agenda-content" class="live-content sidebar-panel hidden">
          <p class="live-placeholder">加载议程中…</p>
        </div>
      </aside>
    </div>
  </div>

  <script type="module" src="/static/js/interview.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 招聘助手 - 上传</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/app-ui.css" />
</head>
<body class="app-page">
  <div class="container home-page">
    <div id="app-nav"></div>
    <header class="page-header">
      <h1>AI 招聘助手</h1>
      <p>选中 JD 后上传简历并筛选；可勾选要参与的简历</p>
    </header>

    <div class="home-layout">
      <aside class="card job-sidebar" id="job-sidebar">
        <div class="sidebar-header">
          <h2>历史岗位 (JD)</h2>
          <button type="button" id="new-job-btn" class="btn btn-secondary btn-sm">+ 新建</button>
        </div>
        <div id="job-list" class="job-list">
          <p class="muted">加载中...</p>
        </div>
      </aside>

      <main class="home-main">
        <div id="panel-new" class="home-panel">
          <div class="card">
            <h2>新建岗位 — 上传 JD</h2>
            <p class="muted">仅上传职位描述；简历在选定 JD 后上传并筛选。</p>
            <div class="field">
              <label for="jd-file">JD 文件 (PDF / DOCX / TXT)</label>
              <input type="file" id="jd-file" accept=".pdf,.docx,.txt" />
            </div>
            <div class="actions">
              <button id="submit-new-btn" class="btn btn-primary">创建岗位</button>
            </div>
          </div>
        </div>

        <div id="panel-existing" class="home-panel hidden">
          <div class="card" id="selected-job-card">
            <h2 id="selected-job-title">—</h2>
            <p class="muted" id="selected-job-meta"></p>
            <p id="selected-job-summary" class="jd-summary-preview"></p>
          </div>

          <div class="card">
            <h2>简历与筛选</h2>
            <p class="muted">上传新简历或勾选已有简历，一次完成筛选。</p>
            <div class="field">
              <label for="resume-files-existing">选择文件 (PDF / DOCX / TXT，可多选)</label>
              <input type="file" id="resume-files-existing" accept=".pdf,.docx,.txt" multiple />
            </div>
            <div class="resume-list-header">
              <h3 class="resume-list-subtitle">参与本次筛选的简历</h3>
              <label class="select-all-label">
                <input type="checkbox" id="select-all-resumes" /> 全选
              </label>
            </div>
            <div id="resume-list" class="resume-select-list">
              <p class="muted">暂无简历，请选择文件后点击「上传并筛选」。</p>
            </div>
            <div class="actions">
              <button id="upload-and-screen-btn" class="btn btn-primary" disabled>上传并筛选</button>
              <button id="enter-screen-btn" class="btn btn-secondary hidden">查看筛选结果</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="screen-progress-modal" class="modal-overlay hidden">
    <div class="card modal-card">
      <h2>简历筛选中</h2>
      <p id="screen-progress-summary" class="muted">准备中…</p>
      <div class="progress-track">
        <div id="screen-progress-bar" class="progress-fill" style="width:0%"></div>
      </div>
      <ul id="screen-progress-list" class="batch-progress-list"></ul>
    </div>
  </div>

  <script type="module" src="/static/js/home.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 招聘助手 - 上传</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>AI 招聘助手</h1>
      <p>上传 JD 与简历，开启智能筛选与模拟面试</p>
      <p><a href="/history.html">历史岗位与面试报告 →</a></p>
    </header>

    <nav class="steps">
      <span class="step active">1. 上传</span>
      <span class="step">2. 筛选</span>
      <span class="step">3. 面试</span>
      <span class="step">4. 报告</span>
    </nav>

    <div class="card">
      <h2>职位描述 (JD)</h2>
      <div class="field">
        <label for="jd-file">上传 JD 文件 (PDF / DOCX / TXT)</label>
        <input type="file" id="jd-file" accept=".pdf,.docx,.txt" />
      </div>
    </div>

    <div class="card">
      <h2>候选人简历</h2>
      <div class="field">
        <label for="resume-files">上传一份或多份简历 (PDF / DOCX / TXT)</label>
        <input type="file" id="resume-files" accept=".pdf,.docx,.txt" multiple />
      </div>
    </div>

    <div class="actions">
      <button id="submit-btn" class="btn btn-primary">上传并开始筛选</button>
    </div>
  </div>

  <script type="module">
    import { showToast, apiRequest } from "/static/js/api.js";

    const submitBtn = document.getElementById("submit-btn");

    submitBtn.addEventListener("click", async () => {
      const jdFile = document.getElementById("jd-file").files[0];
      const resumeFiles = document.getElementById("resume-files").files;

      if (!jdFile) {
        showToast("请先上传 JD 文件", true);
        return;
      }
      if (!resumeFiles.length) {
        showToast("请至少上传一份简历", true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> 处理中...';

      try {
        const jdForm = new FormData();
        jdForm.append("file", jdFile);
        const job = await apiRequest("/api/jobs", { method: "POST", body: jdForm });

        const resumeForm = new FormData();
        for (const f of resumeFiles) resumeForm.append("files", f);
        await apiRequest(`/api/resumes?job_id=${job.id}`, {
          method: "POST",
          body: resumeForm,
        });

        await apiRequest(`/api/screen/${job.id}`, { method: "POST" });
        window.location.href = `/screening.html?job_id=${job.id}`;
      } catch (err) {
        showToast(err.message, true);
        submitBtn.disabled = false;
        submitBtn.textContent = "上传并开始筛选";
      }
    });
  </script>
</body>
</html>

services:
  airecruit:
    build: .
    container_name: airecruit
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/app.db
      CHROMA_PATH: /app/data/chroma
      PUBLIC_BASE_PATH: /airecruit
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
